# Cloudflare Pages / Workers configuration
# Docs: https://developers.cloudflare.com/pages/framework-guides/nextjs/

name = "content-sharing-platform"
pages_build_output_dir = ".vercel/output/static"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Uncomment and configure when connecting KV or D1:
#
# [[kv_namespaces]]
# binding = "VISIT_LOGS_KV"
# id = "your-kv-namespace-id"
#
# [[d1_databases]]
# binding = "DB"
# database_name = "csp-db"
# database_id = "your-d1-database-id"

[vars]
# Non-secret vars can go here. Use Cloudflare dashboard for secrets.
# NEXT_PUBLIC_SITE_URL = "https://your-domain.com"
