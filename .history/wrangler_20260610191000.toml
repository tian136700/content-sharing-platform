# Cloudflare Pages configuration
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "content-sharing-platform"
pages_build_output_dir = ".vercel/output/static"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 database binding (managed via wrangler.toml — UI bindings are locked)
# Find database_id: Cloudflare Dashboard → D1 → csp-db → 概览/Overview
[[d1_databases]]
binding = "DB"
database_name = "csp-db"
database_id = "YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

[vars]
NEXT_PUBLIC_SITE_URL = "https://pursuing-justice.com"
